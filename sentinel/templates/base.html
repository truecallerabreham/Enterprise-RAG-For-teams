<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentinel{% endblock %}</title>
    <meta name="description" content="{% block description %}Project Sentinel — Internal Intelligence System{% endblock %}">
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">Sentinel</a>
            {% block nav %}{% endblock %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Project Sentinel</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
